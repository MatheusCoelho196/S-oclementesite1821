<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{{NOME}} — São Clemente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
{{META_PIXEL}}
<style>
  {{TEMA_CSS}}
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    font-family:'Inter',sans-serif;
    background:var(--fundo);
    color:var(--texto);
  }
  a{ text-decoration:none; color:inherit; }

  header{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    padding:24px 6vw;
  }
  header .logo{
    grid-column:2;
    width:36px;
    height:auto;
    display:block;
  }
  header .logo svg{
    width:100%;
    height:auto;
    display:block;
  }
  header .whatsapp-btn{
    grid-column:3;
    justify-self:end;
  }
  .whatsapp-btn{
    background:var(--azul-primario);
    color:var(--branco);
    font-family:'Inter',sans-serif;
    font-size:0.85rem;
    font-weight:500;
    padding:10px 20px;
    border-radius:2px;
  }

  main{
    max-width:640px;
    margin:6vh auto 10vh;
    padding:0 6vw;
    text-align:center;
  }

  .galeria{
    position:relative;
    margin-bottom:36px;
  }
  .foto-container{
    overflow:hidden;
    aspect-ratio:4/3;
    border-radius:2px;
    background:var(--branco);
    border:1px solid rgba(28,28,28,0.06);
    cursor:zoom-in;
    box-shadow:{{FOTO_SOMBRA}};
  }

  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(28,28,28,0.5);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:6vw;
    z-index:100;
  }
  .modal-overlay[hidden]{ display:none; }
  .modal-card{
    background:{{MODAL_BG}};
    border-radius:4px;
    max-width:440px;
    width:100%;
    max-height:80vh;
    overflow-y:auto;
    padding:32px;
    text-align:left;
    position:relative;
  }
  .modal-fechar{
    position:absolute;
    top:16px;
    right:16px;
    width:32px;
    height:32px;
    border-radius:50%;
    border:1px solid rgba(28,28,28,0.15);
    background:var(--branco);
    cursor:pointer;
    font-size:1rem;
  }
  .modal-card h2{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-size:18px;
    margin-bottom:14px;
    padding-right:32px;
  }
  .modal-card p{
    font-size:14px;
    line-height:1.6;
    margin-bottom:20px;
  }
  .modal-card .modal-cores-label{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    opacity:0.55;
    margin-bottom:10px;
  }
  .modal-cores{
    display:flex;
    gap:16px;
    margin-bottom:28px;
  }
  .modal-cores div{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    font-size:12px;
  }
  .modal-cores .swatch{ cursor:default; }

  .modal-whatsapp{
    display:flex;
    align-items:center;
    justify-content:center;
    width:48px;
    height:48px;
    border-radius:50%;
    background:#25D366;
  }
  .modal-whatsapp svg{ width:24px; height:24px; }
  .foto-container img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
  }
  .galeria-nav{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:36px;
    height:36px;
    border-radius:50%;
    border:1px solid rgba(28,28,28,0.15);
    background:var(--branco);
    color:var(--azul-primario);
    font-size:1rem;
    cursor:pointer;
    opacity:0.85;
  }
  .galeria-nav:hover{ opacity:1; }
  .galeria-nav.prev{ left:12px; }
  .galeria-nav.next{ right:12px; }
  .galeria-legenda{
    font-size:12px;
    color:var(--texto);
    opacity:0.55;
    margin-top:10px;
  }

  h1{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-size:16px;
    margin-bottom:6px;
  }
  .preco{
    font-family:'Inter',sans-serif;
    font-size:13px;
    color:var(--azul-secundario);
    margin-bottom:16px;
  }

  .swatches{
    display:flex;
    justify-content:center;
    gap:8px;
    margin-bottom:32px;
  }
  .swatch{
    width:16px;
    height:16px;
    border-radius:50%;
    display:inline-block;
    border:1px solid rgba(28,28,28,0.15);
    padding:0;
    cursor:pointer;
    box-shadow:none;
  }
  .swatch[aria-pressed="true"]{
    outline:2px solid var(--azul-secundario);
    outline-offset:2px;
  }
  .swatch--texto{
    width:auto;
    height:auto;
    border-radius:12px;
    padding:4px 12px;
    font-size:11px;
    font-family:'Inter',sans-serif;
    color:var(--texto);
    background:var(--branco);
    border:1px solid rgba(28,28,28,0.15);
  }

  .cta{
    display:inline-block;
    background:var(--azul-primario);
    color:var(--branco);
    font-size:0.9rem;
    font-weight:500;
    padding:14px 30px;
    border-radius:2px;
    transition:opacity 0.2s ease;
  }
  .cta:hover{ opacity:0.85; }
  a:focus-visible, .cta:focus-visible{
    outline:2px solid var(--azul-secundario);
    outline-offset:2px;
  }

  @media (prefers-reduced-motion: reduce){
    .cta{ transition:none; }
  }
</style>
</head>
<body>

  <header>
    <a class="logo" href="/">{{LOGO_SVG}}</a>
    <a class="whatsapp-btn" href="{{WHATSAPP_GENERICO}}" target="_blank" rel="noopener">WhatsApp</a>
  </header>

  <main>
    <div class="galeria">
      <div class="foto-container">
        <img id="foto-produto" src="{{FOTO}}" alt="{{NOME}}" onclick="abrirModal()" />
      </div>
      <button type="button" class="galeria-nav prev" aria-label="Foto anterior" onclick="mudarFoto(-1)">‹</button>
      <button type="button" class="galeria-nav next" aria-label="Próxima foto" onclick="mudarFoto(1)">›</button>
      <p class="galeria-legenda" id="galeria-legenda"></p>
    </div>
    <h1>{{NOME}}</h1>
    <p class="preco">{{PRECO}}</p>
    <div class="swatches" id="swatches">{{SWATCHES}}</div>
    <a class="cta" href="{{WHATSAPP_PRODUTO}}" target="_blank" rel="noopener">Falar no WhatsApp</a>
  </main>

  <div class="modal-overlay" id="modal" hidden onclick="if(event.target===this) fecharModal()">
    <div class="modal-card">
      <button type="button" class="modal-fechar" aria-label="Fechar" onclick="fecharModal()">×</button>
      <h2>{{NOME}}</h2>
      <p>{{DESCRICAO}}</p>
      <p class="modal-cores-label">Cores disponíveis</p>
      <div class="modal-cores" id="modal-cores"></div>
      <a class="modal-whatsapp" href="{{WHATSAPP_PRODUTO}}" target="_blank" rel="noopener" aria-label="Falar no WhatsApp sobre este produto">
        <svg viewBox="0 0 32 32" fill="white" xmlns="http://www.w3.org/2000/svg">
          <path d="M16.004 3C9.377 3 4 8.373 4 15c0 2.34.655 4.527 1.793 6.393L4 29l7.8-1.755A11.94 11.94 0 0 0 16.004 27C22.63 27 28 21.627 28 15S22.63 3 16.004 3zm6.98 16.98c-.297.834-1.469 1.53-2.407 1.732-.64.137-1.474.246-4.29-.92-3.598-1.49-5.912-5.135-6.093-5.373-.174-.238-1.462-1.946-1.462-3.712s.925-2.634 1.253-2.994c.297-.324.65-.406.868-.406.218 0 .436.002.626.011.202.01.472-.077.738.564.297.71.98 2.454 1.066 2.633.087.18.145.39.03.628-.116.238-.174.386-.348.594-.174.208-.365.464-.522.624-.174.176-.356.367-.153.72.203.353.902 1.494 1.938 2.42 1.332 1.19 2.454 1.557 2.81 1.733.36.176.567.15.777-.09.21-.24.884-1.028 1.12-1.38.235-.353.47-.294.79-.176.32.118 2.036.96 2.384 1.135.348.176.58.264.665.412.087.147.087.85-.21 1.684z"/>
        </svg>
      </a>
    </div>
  </div>

  <script>
    const FOTOS = {{FOTOS_JSON}};
    const CORES = Object.keys(FOTOS);
    const CORES_HEX = { "Branco":"#FFFFFF", "Cinza":"#B0B0AC", "Preto":"#1C1C1C", "Grafite":"#2B2B2B" };
    const RÓTULOS_TEXTO = ["Piso", "Ambiente"];
    const FB_CONTENT_IDS = {{FB_CONTENT_IDS_JSON}};
    const FB_VALOR = {{PRECO_VALOR}};
    let indiceAtual = 0;

    function dispararViewContent(cor) {
      if (typeof fbq === 'function') {
        fbq('track', 'ViewContent', {
          content_ids: [FB_CONTENT_IDS[cor]],
          content_type: 'product',
          value: FB_VALOR,
          currency: 'BRL'
        });
      }
    }

    function atualizarFoto() {
      const cor = CORES[indiceAtual];
      document.getElementById('foto-produto').src = FOTOS[cor];
      document.getElementById('foto-produto').alt = document.title.split(' — ')[0] + ' — ' + cor;
      document.getElementById('galeria-legenda').textContent = cor;
      document.querySelectorAll('.swatches .swatch').forEach((el, i) => {
        el.setAttribute('aria-pressed', i === indiceAtual ? 'true' : 'false');
      });
      dispararViewContent(cor);
    }

    function mudarFoto(direcao) {
      indiceAtual = (indiceAtual + direcao + CORES.length) % CORES.length;
      atualizarFoto();
    }

    document.querySelectorAll('.swatches .swatch').forEach((el, i) => {
      el.addEventListener('click', () => {
        indiceAtual = i;
        atualizarFoto();
      });
    });

    const modalCores = document.getElementById('modal-cores');
    CORES.forEach((cor) => {
      const item = document.createElement('div');
      if (RÓTULOS_TEXTO.includes(cor)) {
        const pilula = document.createElement('span');
        pilula.className = 'swatch swatch--texto';
        pilula.textContent = cor;
        item.appendChild(pilula);
      } else {
        const bolinha = document.createElement('span');
        bolinha.className = 'swatch';
        bolinha.style.background = CORES_HEX[cor] || '#CCCCCC';
        const label = document.createElement('span');
        label.textContent = cor;
        item.appendChild(bolinha);
        item.appendChild(label);
      }
      modalCores.appendChild(item);
    });

    function abrirModal() {
      document.getElementById('modal').hidden = false;
    }
    function fecharModal() {
      document.getElementById('modal').hidden = true;
    }
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') fecharModal();
    });

    atualizarFoto();
  </script>

</body>
</html>
