<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{{CATEGORIA}} — São Clemente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --azul-primario:#134793;
    --azul-secundario:#385fc7;
    --branco:#FFFFFF;
    --fundo:#FAFAF9;
    --texto:#1C1C1C;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    font-family:'Inter',sans-serif;
    background:var(--fundo);
    color:var(--texto);
  }
  a{ text-decoration:none; color:inherit; }

  header{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    padding:24px 6vw;
  }
  header .logo{
    grid-column:2;
    width:36px;
    height:auto;
    display:block;
  }
  header .logo svg{
    width:100%;
    height:auto;
    display:block;
  }
  header .whatsapp-btn{
    grid-column:3;
    justify-self:end;
  }
  .whatsapp-btn{
    background:var(--azul-primario);
    color:var(--branco);
    font-family:'Inter',sans-serif;
    font-size:0.85rem;
    font-weight:500;
    padding:10px 20px;
    border-radius:2px;
  }

  .titulo-categoria{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-size:1.4rem;
    padding:20px 6vw 32px;
  }

  .carousel-wrap{
    position:relative;
    padding-bottom:10vh;
  }

  .carousel{
    display:flex;
    gap:24px;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
    padding:0 6vw 8px;
    scrollbar-width:none;
  }
  .carousel::-webkit-scrollbar{ display:none; }

  .slide{
    flex:0 0 auto;
    width:72vw;
    max-width:280px;
    scroll-snap-align:start;
  }

  .slide .foto-container{
    overflow:hidden;
    aspect-ratio:4/3;
    border-radius:2px;
    background:var(--branco);
    border:1px solid rgba(28,28,28,0.06);
    margin-bottom:16px;
    cursor:zoom-in;
  }
  .slide img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
  }
  .slide h2{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-size:16px;
    margin-bottom:4px;
  }
  .slide .cor{
    font-size:12px;
    color:var(--texto);
    opacity:0.55;
    margin-bottom:2px;
  }
  .slide .preco{
    font-size:13px;
    color:var(--azul-secundario);
  }
  .slide:focus-visible{
    outline:2px solid var(--azul-secundario);
    outline-offset:4px;
  }

  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(28,28,28,0.5);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:6vw;
    z-index:100;
  }
  .modal-overlay[hidden]{ display:none; }
  .modal-card{
    background:var(--fundo);
    border-radius:4px;
    max-width:440px;
    width:100%;
    max-height:80vh;
    overflow-y:auto;
    padding:32px;
    text-align:left;
    position:relative;
  }
  .modal-fechar{
    position:absolute;
    top:16px;
    right:16px;
    width:32px;
    height:32px;
    border-radius:50%;
    border:1px solid rgba(28,28,28,0.15);
    background:var(--branco);
    cursor:pointer;
    font-size:1rem;
  }
  .modal-card h2{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-size:18px;
    margin-bottom:14px;
    padding-right:32px;
  }
  .modal-card p{
    font-size:14px;
    line-height:1.6;
    margin-bottom:20px;
  }
  .modal-card .modal-cores-label{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    opacity:0.55;
    margin-bottom:10px;
  }
  .modal-cores{
    display:flex;
    gap:16px;
    margin-bottom:28px;
  }
  .modal-cores div{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    font-size:12px;
  }
  .modal-cores .swatch{
    width:16px;
    height:16px;
    border-radius:50%;
    display:inline-block;
    border:1px solid rgba(28,28,28,0.15);
  }

  .modal-whatsapp{
    display:flex;
    align-items:center;
    justify-content:center;
    width:48px;
    height:48px;
    border-radius:50%;
    background:#25D366;
  }
  .modal-whatsapp svg{ width:24px; height:24px; }

  .carousel-nav{
    display:flex;
    gap:10px;
    padding:16px 6vw 0;
  }
  .carousel-nav button{
    width:36px;
    height:36px;
    border-radius:50%;
    border:1px solid rgba(28,28,28,0.15);
    background:var(--branco);
    color:var(--azul-primario);
    font-size:1rem;
    cursor:pointer;
  }
  .carousel-nav button:hover{ background:var(--fundo); }

  @media (min-width:640px){
    .slide{ width:280px; }
  }
  @media (prefers-reduced-motion: reduce){
    .carousel{ scroll-behavior:auto; }
  }
</style>
</head>
<body>

  <header>
    <a class="logo" href="/">{{LOGO_SVG}}</a>
    <a class="whatsapp-btn" href="{{WHATSAPP_GENERICO}}" target="_blank" rel="noopener">WhatsApp</a>
  </header>

  <h1 class="titulo-categoria">{{CATEGORIA}}</h1>

  <div class="carousel-wrap">
    <div class="carousel" id="carousel">
      {{SLIDES}}
    </div>
    <div class="carousel-nav">
      <button type="button" aria-label="Anterior" onclick="document.getElementById('carousel').scrollBy({left:-304,behavior:'smooth'})">‹</button>
      <button type="button" aria-label="Próximo" onclick="document.getElementById('carousel').scrollBy({left:304,behavior:'smooth'})">›</button>
    </div>
  </div>

  <div class="modal-overlay" id="modal" hidden onclick="if(event.target===this) fecharModal()">
    <div class="modal-card">
      <button type="button" class="modal-fechar" aria-label="Fechar" onclick="fecharModal()">×</button>
      <h2 id="modal-nome"></h2>
      <p id="modal-descricao"></p>
      <p class="modal-cores-label">Cores disponíveis</p>
      <div class="modal-cores" id="modal-cores"></div>
      <a class="modal-whatsapp" href="{{WHATSAPP_PRODUTO}}" target="_blank" rel="noopener" aria-label="Falar no WhatsApp sobre este produto">
        <svg viewBox="0 0 32 32" fill="white" xmlns="http://www.w3.org/2000/svg">
          <path d="M16.004 3C9.377 3 4 8.373 4 15c0 2.34.655 4.527 1.793 6.393L4 29l7.8-1.755A11.94 11.94 0 0 0 16.004 27C22.63 27 28 21.627 28 15S22.63 3 16.004 3zm6.98 16.98c-.297.834-1.469 1.53-2.407 1.732-.64.137-1.474.246-4.29-.92-3.598-1.49-5.912-5.135-6.093-5.373-.174-.238-1.462-1.946-1.462-3.712s.925-2.634 1.253-2.994c.297-.324.65-.406.868-.406.218 0 .436.002.626.011.202.01.472-.077.738.564.297.71.98 2.454 1.066 2.633.087.18.145.39.03.628-.116.238-.174.386-.348.594-.174.208-.365.464-.522.624-.174.176-.356.367-.153.72.203.353.902 1.494 1.938 2.42 1.332 1.19 2.454 1.557 2.81 1.733.36.176.567.15.777-.09.21-.24.884-1.028 1.12-1.38.235-.353.47-.294.79-.176.32.118 2.036.96 2.384 1.135.348.176.58.264.665.412.087.147.087.85-.21 1.684z"/>
        </svg>
      </a>
    </div>
  </div>

  <script>
    const CORES_HEX = { "Branco":"#FFFFFF", "Cinza":"#B0B0AC", "Preto":"#1C1C1C", "Grafite":"#2B2B2B" };

    function decodificarInfo(base64) {
      const binario = atob(base64);
      const bytes = new Uint8Array(binario.length);
      for (let i = 0; i < binario.length; i++) bytes[i] = binario.charCodeAt(i);
      return JSON.parse(new TextDecoder('utf-8').decode(bytes));
    }

    function abrirModalVitrine(img) {
      const info = decodificarInfo(img.dataset.info);
      document.getElementById('modal-nome').textContent = info.nome;
      document.getElementById('modal-descricao').textContent = info.descricao;

      const modalCores = document.getElementById('modal-cores');
      modalCores.innerHTML = '';
      info.cores.forEach((cor) => {
        const item = document.createElement('div');
        const bolinha = document.createElement('span');
        bolinha.className = 'swatch';
        bolinha.style.background = CORES_HEX[cor] || '#CCCCCC';
        const label = document.createElement('span');
        label.textContent = cor;
        item.appendChild(bolinha);
        item.appendChild(label);
        modalCores.appendChild(item);
      });

      document.getElementById('modal').hidden = false;
    }

    function fecharModal() {
      document.getElementById('modal').hidden = true;
    }
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') fecharModal();
    });
  </script>

</body>
</html>
