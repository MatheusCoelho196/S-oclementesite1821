<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>São Clemente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --azul-primario:#134793;
    --azul-secundario:#385fc7;
    --branco:#FFFFFF;
    --fundo:#FAFAF9;
    --texto:#1C1C1C;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    font-family:'Inter',sans-serif;
    background:var(--fundo);
    color:var(--texto);
  }
  a{ text-decoration:none; color:inherit; }

  header{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    padding:24px 6vw;
  }
  header .logo{
    grid-column:2;
    width:36px;
    height:auto;
    display:block;
  }
  header .logo svg{
    width:100%;
    height:auto;
    display:block;
  }
  header .whatsapp-btn{
    grid-column:3;
    justify-self:end;
  }
  .whatsapp-btn{
    background:var(--azul-primario);
    color:var(--branco);
    font-family:'Inter',sans-serif;
    font-size:0.85rem;
    font-weight:500;
    padding:10px 20px;
    border-radius:2px;
  }

  .hero{
    text-align:center;
    padding:8vh 6vw 6vh;
  }
  .hero h1{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-size:clamp(1.6rem, 4vw, 2.2rem);
    margin-bottom:12px;
  }
  .hero p{
    font-size:0.95rem;
    color:var(--texto);
    opacity:0.65;
    max-width:46ch;
    margin:0 auto;
  }

  .categorias{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));
    gap:32px;
    padding:0 6vw 12vh;
    max-width:900px;
    margin:0 auto;
  }
  .categoria-card{
    display:block;
  }
  .categoria-card .foto-container{
    overflow:hidden;
    aspect-ratio:4/3;
    border-radius:2px;
    background:var(--branco);
    border:1px solid rgba(28,28,28,0.06);
    margin-bottom:16px;
  }
  .categoria-card img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
    transition:transform 0.4s ease;
  }
  .categoria-card:hover img{
    transform:scale(1.05);
  }
  .categoria-card h2{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-size:16px;
    text-align:center;
  }
  .categoria-card:focus-visible{
    outline:2px solid var(--azul-secundario);
    outline-offset:4px;
  }

  @media (prefers-reduced-motion: reduce){
    .categoria-card img{ transition:none; }
  }
</style>
</head>
<body>

  <header>
    <a class="logo" href="/">{{LOGO_SVG}}</a>
    <a class="whatsapp-btn" href="{{WHATSAPP_GENERICO}}" target="_blank" rel="noopener">WhatsApp</a>
  </header>

  <section class="hero">
    <h1>São Clemente</h1>
    <p>Móveis de qualidade para a sua casa, com entrega e atendimento direto pelo WhatsApp.</p>
  </section>

  <div class="categorias">
    {{CATEGORIAS_CARDS}}
  </div>

</body>
</html>
